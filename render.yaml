services:
  - type: web
    name: studynotion-api
    runtime: node
    plan: free
    repo: https://github.com/Himansh1997/StudyNotion-AI
    buildCommand: cd server && npm ci
    startCommand: cd server && npm start
    healthCheckPath: /health
    autoDeploy: false
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20.15.0
      - key: CLIENT_URL
        value: https://studynotion-ai.vercel.app
      - key: OPENAI_MODEL
        value: gpt-5.6-terra
      - key: AI_REQUESTS_PER_HOUR
        value: 20
      - key: EMAIL_REQUEST_TIMEOUT_MS
        value: 15000
      - key: MAIL_FROM_NAME
        value: StudyNotion
      - key: OPENAI_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: MONGODB_URL
        sync: false
      - key: GMAIL_APPS_SCRIPT_URL
        sync: false
      - key: EMAIL_WEBHOOK_SECRET
        sync: false
      - key: MAIL_REPLY_TO
        sync: false
      - key: CLOUD_NAME
        sync: false
      - key: API_KEY
        sync: false
      - key: API_SECRET
        sync: false
      - key: FOLDER_NAME
        sync: false
      - key: RAZORPAY_KEY
        sync: false
      - key: RAZORPAY_SECRET
        sync: false
