services:
  - type: web
    name: studynotion-api
    runtime: node
    plan: free
    repo: https://github.com/Himansh1997/StudyNotion-AI
    buildCommand: cd server && npm ci
    startCommand: cd server && npm start
    healthCheckPath: /health
    autoDeploy: false
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20.15.0
      - key: CLIENT_URL
        value: http://localhost:3000
      - key: OPENAI_MODEL
        value: gpt-5.6-terra
      - key: AI_REQUESTS_PER_HOUR
        value: 20
      - key: MAIL_PORT
        value: 587
      - key: MAIL_SECURE
        value: false
      - key: MAIL_HOST
        value: smtp.gmail.com
      - key: OPENAI_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: MONGODB_URL
        sync: false
      - key: MAIL_USER
        sync: false
      - key: MAIL_PASS
        sync: false
      - key: CLOUD_NAME
        sync: false
      - key: API_KEY
        sync: false
      - key: API_SECRET
        sync: false
      - key: FOLDER_NAME
        sync: false
      - key: RAZORPAY_KEY
        sync: false
      - key: RAZORPAY_SECRET
        sync: false
